# ═══════════════════════════════════════════════════════════════════
# AIVORA AI — Complete Auto Deploy Workflow
# File path in your repo: .github/workflows/deploy.yml
#
# WHAT THIS DOES AUTOMATICALLY ON EVERY PUSH:
# ✅ 1. Injects GTM (GTM-NWSJTJ3M) + GA4 into ALL pages
# ✅ 2. Injects favicon into ALL pages
# ✅ 3. Injects Twitter/X, Instagram, Facebook social links
# ✅ 4. Reads ALL blog cards from blog.html → adds to sitemap
# ✅ 5. Auto-generates full sitemap.xml (every page + blog)
# ✅ 6. Auto-generates rss.xml from all blog posts
# ✅ 7. Commits everything back to repo
# ✅ 8. Deploys live to GitHub Pages
# ═══════════════════════════════════════════════════════════════════

name: Aivora AI — Full Auto Pipeline

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  process:
    name: Process + Sitemap + RSS
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Aivora AI Auto Pipeline
        run: |
          python3 - << 'PYEOF'
          import os, re
          from datetime import date, datetime

          # ══════════════════════════════════════════════
          # CONFIG — change only these values if needed
          # ══════════════════════════════════════════════
          BASE_URL    = "https://aivoraai.github.io"
          GTM_ID      = "GTM-NWSJTJ3M"
          GA_ID       = "G-N0LH3EN5QE"
          FAVICON_URL = "https://aivoraai.github.io/assets/images/aivora-logo-primary.png"
          TWITTER     = "https://x.com/aivoraai_co"
          INSTAGRAM   = "https://www.instagram.com/aivoraai.co"
          FACEBOOK    = "https://www.facebook.com/profile.php?id=61569221487849"
          SITE_NAME   = "Aivora AI"
          SITE_DESC   = "200+ independently reviewed AI tools, affiliate marketing guides, passive income strategies and AI tutorials — updated weekly."
          AUTHOR      = "Varun Lalwani"
          TODAY       = date.today().isoformat()
          NOW_RFC     = datetime.utcnow().strftime("%a, %d %b %Y %H:%M:%S +0000")

          # ══════════════════════════════════════════════
          # SNIPPETS TO INJECT
          # ══════════════════════════════════════════════

          GTM_HEAD = f"""<!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){{w[l]=w[l]||[];w[l].push({{'gtm.start':new Date().getTime(),event:'gtm.js'}});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);}})(window,document,'script','dataLayer','{GTM_ID}');</script>
  <!-- End Google Tag Manager -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={GA_ID}"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){{dataLayer.push(arguments);}}gtag('js',new Date());gtag('config','{GA_ID}');</script>"""

          GTM_BODY = f"""<!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id={GTM_ID}" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->"""

          FAV_TAGS = f"""  <link rel="icon" type="image/png" href="{FAVICON_URL}"/>
  <link rel="apple-touch-icon" href="{FAVICON_URL}"/>
  <meta name="theme-color" content="#00c896"/>"""

          SOCIAL_META = f"""  <!-- Social Media -->
  <meta name="twitter:site" content="@aivoraai_co"/>
  <meta name="twitter:creator" content="@aivoraai_co"/>
  <meta property="og:site_name" content="{SITE_NAME}"/>"""

          RSS_LINK = f'  <link rel="alternate" type="application/rss+xml" title="{SITE_NAME} Blog RSS" href="{BASE_URL}/rss.xml"/>'

          # ══════════════════════════════════════════════
          # COLLECT ALL HTML FILES
          # ══════════════════════════════════════════════
          html_files = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for f in files:
                  if f.endswith(".html"):
                      html_files.append(os.path.join(root, f))

          print(f"Found {len(html_files)} HTML files")
          gtm_c = fav_c = soc_c = rss_c = 0

          for fpath in html_files:
              with open(fpath, "r", encoding="utf-8", errors="ignore") as fh:
                  c = fh.read()
              changed = False

              # Inject GTM
              if GTM_ID not in c:
                  c = re.sub(r'(<head[^>]*>)', r'\1\n' + GTM_HEAD, c, count=1, flags=re.IGNORECASE)
                  c = re.sub(r'(<body[^>]*>)', r'\1\n' + GTM_BODY, c, count=1, flags=re.IGNORECASE)
                  gtm_c += 1; changed = True
                  print(f"  GTM -> {fpath}")

              # Inject favicon
              if 'aivora-logo.png' not in c and '<head' in c.lower():
                  c = re.sub(r'(</head>)', FAV_TAGS + '\n' + r'\1', c, count=1, flags=re.IGNORECASE)
                  fav_c += 1; changed = True
                  print(f"  FAV -> {fpath}")

              # Inject social meta tags
              if '@aivoraai_co' not in c and '<head' in c.lower():
                  c = re.sub(r'(</head>)', SOCIAL_META + '\n' + r'\1', c, count=1, flags=re.IGNORECASE)
                  soc_c += 1; changed = True
                  print(f"  SOC -> {fpath}")

              # Inject RSS link
              if 'rss.xml' not in c and '<head' in c.lower():
                  c = re.sub(r'(</head>)', RSS_LINK + '\n' + r'\1', c, count=1, flags=re.IGNORECASE)
                  rss_c += 1; changed = True
                  print(f"  RSS -> {fpath}")

              if changed:
                  with open(fpath, "w", encoding="utf-8") as fh:
                      fh.write(c)

          # ══════════════════════════════════════════════
          # EXTRACT ALL BLOG CARD LINKS FROM blog.html
          # ══════════════════════════════════════════════
          blog_posts = []  # list of (url, title, date, description, category)

          blog_html_path = "blog.html"
          if os.path.exists(blog_html_path):
              with open(blog_html_path, "r", encoding="utf-8", errors="ignore") as fh:
                  blog_content = fh.read()

              # Find all blog cards: <a href="blog/..." class="bc" ...>
              card_pattern = re.finditer(
                  r'<a[^>]+href=["\']([^"\']*blog/[^"\']+\.html)["\'][^>]*class=["\'][^"\']*bc[^"\']*["\'][^>]*>(.*?)</a>',
                  blog_content, re.DOTALL | re.IGNORECASE
              )

              for match in card_pattern:
                  href = match.group(1).strip()
                  card_html = match.group(2)

                  # Extract title from h3
                  title_m = re.search(r'<h3[^>]*>(.*?)</h3>', card_html, re.DOTALL)
                  title = re.sub(r'<[^>]+>', '', title_m.group(1)).strip() if title_m else "Aivora AI Blog Post"

                  # Extract description from p
                  desc_m = re.search(r'<p[^>]*>(.*?)</p>', card_html, re.DOTALL)
                  desc = re.sub(r'<[^>]+>', '', desc_m.group(1)).strip() if desc_m else ""

                  # Extract date from bfoot
                  date_m = re.search(r'<span[^>]*>(\d{1,2}\s+\w+\s+\d{4})', card_html)
                  pub_date = date_m.group(1).strip() if date_m else TODAY

                  # Extract category
                  cat_m = re.search(r'<span[^>]*bcat[^>]*>(.*?)</span>', card_html, re.DOTALL)
                  category = re.sub(r'<[^>]+>', '', cat_m.group(1)).strip() if cat_m else "AI Tools"

                  # Build full URL
                  if href.startswith("http"):
                      full_url = href
                  else:
                      full_url = BASE_URL + "/" + href.lstrip("/")

                  blog_posts.append({
                      "url": full_url,
                      "title": title[:100],
                      "desc": desc[:200],
                      "date": pub_date,
                      "category": category
                  })

              print(f"\nExtracted {len(blog_posts)} blog posts from blog.html")

          # ══════════════════════════════════════════════
          # BUILD SITEMAP.XML
          # ══════════════════════════════════════════════
          sitemap_urls = []

          # Static pages
          static_pages = [
              ("", "1.0", "daily"),
              ("blog.html", "0.9", "daily"),
              ("product.html", "0.9", "weekly"),
              ("about.html", "0.7", "monthly"),
              ("contact.html", "0.6", "monthly"),
          ]
          for path, pri, freq in static_pages:
              url = BASE_URL + "/" + path if path else BASE_URL + "/"
              sitemap_urls.append({"url": url, "pri": pri, "freq": freq})

          # All blog pages from blog.html cards
          seen_urls = set()
          for post in blog_posts:
              if post["url"] not in seen_urls:
                  sitemap_urls.append({"url": post["url"], "pri": "0.8", "freq": "monthly"})
                  seen_urls.add(post["url"])

          # Also scan /blog/ folder for any HTML files not in cards
          blog_dir = "blog"
          if os.path.isdir(blog_dir):
              for fname in os.listdir(blog_dir):
                  if fname.endswith(".html"):
                      full_url = BASE_URL + "/blog/" + fname
                      if full_url not in seen_urls:
                          sitemap_urls.append({"url": full_url, "pri": "0.8", "freq": "monthly"})
                          seen_urls.add(full_url)

          # Write sitemap.xml
          xml  = '<?xml version="1.0" encoding="UTF-8"?>\n'
          xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n\n'
          xml += f'  <!-- {SITE_NAME} Sitemap | Auto-generated: {TODAY} | Total: {len(sitemap_urls)} URLs -->\n\n'
          for item in sitemap_urls:
              xml += '  <url>\n'
              xml += f'    <loc>{item["url"]}</loc>\n'
              xml += f'    <lastmod>{TODAY}</lastmod>\n'
              xml += f'    <changefreq>{item["freq"]}</changefreq>\n'
              xml += f'    <priority>{item["pri"]}</priority>\n'
              xml += '  </url>\n'
          xml += '\n</urlset>'

          with open("sitemap.xml", "w", encoding="utf-8") as f:
              f.write(xml)
          print(f"sitemap.xml written — {len(sitemap_urls)} URLs")

          # ══════════════════════════════════════════════
          # BUILD RSS.XML
          # ══════════════════════════════════════════════
          rss  = '<?xml version="1.0" encoding="UTF-8"?>\n'
          rss += '<rss version="2.0" xmlns:atom="http://www.w3.org/2005/Atom" xmlns:content="http://purl.org/rss/1.0/modules/content/">\n'
          rss += '  <channel>\n'
          rss += f'    <title>{SITE_NAME} — AI Guides, Reviews &amp; Income Strategies</title>\n'
          rss += f'    <link>{BASE_URL}/blog.html</link>\n'
          rss += f'    <description>{SITE_DESC}</description>\n'
          rss += f'    <language>en-us</language>\n'
          rss += f'    <lastBuildDate>{NOW_RFC}</lastBuildDate>\n'
          rss += f'    <atom:link href="{BASE_URL}/rss.xml" rel="self" type="application/rss+xml"/>\n'
          rss += f'    <image>\n'
          rss += f'      <url>{FAVICON_URL}</url>\n'
          rss += f'      <title>{SITE_NAME}</title>\n'
          rss += f'      <link>{BASE_URL}/</link>\n'
          rss += f'    </image>\n'
          # Author / social links in RSS
          rss += f'    <managingEditor>Aivoraai@outlook.com ({AUTHOR})</managingEditor>\n'
          rss += f'    <webMaster>Aivoraai@outlook.com ({AUTHOR})</webMaster>\n\n'

          # Add blog posts as RSS items (max 100)
          for post in blog_posts[:100]:
              rss += '    <item>\n'
              rss += f'      <title><![CDATA[{post["title"]}]]></title>\n'
              rss += f'      <link>{post["url"]}</link>\n'
              rss += f'      <guid isPermaLink="true">{post["url"]}</guid>\n'
              rss += f'      <description><![CDATA[{post["desc"]}]]></description>\n'
              rss += f'      <category><![CDATA[{post["category"]}]]></category>\n'
              rss += f'      <author>Aivoraai@outlook.com ({AUTHOR})</author>\n'
              rss += f'      <pubDate>{NOW_RFC}</pubDate>\n'
              rss += '    </item>\n'

          rss += '  </channel>\n'
          rss += '</rss>'

          with open("rss.xml", "w", encoding="utf-8") as f:
              f.write(rss)
          print(f"rss.xml written — {len(blog_posts[:100])} items")

          # ══════════════════════════════════════════════
          # SUMMARY
          # ══════════════════════════════════════════════
          print("")
          print("═══════════════════════════════════════════")
          print(f"  AIVORA AI Pipeline Complete — {TODAY}")
          print("═══════════════════════════════════════════")
          print(f"  HTML files processed : {len(html_files)}")
          print(f"  GTM injected         : {gtm_c} pages")
          print(f"  Favicon injected     : {fav_c} pages")
          print(f"  Social meta injected : {soc_c} pages")
          print(f"  RSS link injected    : {rss_c} pages")
          print(f"  Blog posts found     : {len(blog_posts)}")
          print(f"  Sitemap URLs         : {len(sitemap_urls)}")
          print(f"  RSS items            : {len(blog_posts[:100])}")
          print("═══════════════════════════════════════════")
          print(f"  Twitter : {TWITTER}")
          print(f"  Instagram: {INSTAGRAM}")
          print(f"  Facebook : {FACEBOOK}")
          print("═══════════════════════════════════════════")
          PYEOF

      - name: Commit all changes back to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Aivora AI Bot"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Auto Pipeline: GTM+Favicon+Social injected | Sitemap+RSS updated | $(date '+%Y-%m-%d %H:%M') | $(grep -c '<url>' sitemap.xml) sitemap URLs | $(grep -c '<item>' rss.xml) RSS items"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    name: Deploy to GitHub Pages
    needs: process
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment complete
        run: |
          echo "═══════════════════════════════════════════"
          echo "  ✅ AIVORA AI LIVE!"
          echo "  🌐 https://aivoraai.github.io"
          echo "  🐦 https://x.com/aivoraai_co"
          echo "  📸 https://www.instagram.com/aivoraai.co"
          echo "  📘 https://www.facebook.com/profile.php?id=61569221487849"
          echo "═══════════════════════════════════════════"
YAMLEOF
echo "Done: $(wc -l < /mnt/user-data/outputs/deploy.yml) lines"
