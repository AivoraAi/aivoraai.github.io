name: Aivora SEO Fix v3 — Safe

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  seo-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run safe SEO fix
        run: python aivora_seo_fix_v3.py

      - name: Commit and push
        run: |
          git config user.name "Aivora SEO Bot"
          git config user.email "aivoraai@outlook.com"
          git add -A
          git diff --staged --quiet || git commit -m "SEO Fix v3: dates+meta+related+sitemap — $(date +'%d %b %Y')"
          git push
