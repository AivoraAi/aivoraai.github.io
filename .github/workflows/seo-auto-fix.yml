name: 🤖 Aivora SEO Mega Fix

on: 
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'   # Har Somwar raat 2 baje

jobs:
  seo-fix:
    runs-on: ubuntu-latest
    name: SEO Auto Fix — Dates, Links, Sitemap, Sort

    permissions:
      contents: write

    steps:

      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔧 Run SEO Mega Fix Script
        run: python aivora_seo_fix.py

      - name: 📤 Commit and Push all fixes
        run: |
          git config user.name "Aivora SEO Bot"
          git config user.email "aivoraai@outlook.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 SEO Auto Fix: dates+links+sitemap+sort — $(date +'%d %b %Y')"
          git push

      - name: 📋 Show fix report
        run: cat seo_report.txt || echo "Report not found"
