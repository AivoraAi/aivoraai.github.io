<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contact Us – Aivora AI | Varun Lalwani</title>
  <meta name="description" content="Contact Aivora AI"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet"/>
  
  <style>
    :root{
      --bg:#050a0e;--bg2:#091014;--bg3:#0d1a1f;--card:#0f1e26;
      --em:#00c896;--text:#e8f4f0;--text2:#7fb3a0;--text3:#3d6b5a;
      --r2:14px;--r4:28px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}
    .wrap{max-width:1200px;margin:0 auto;padding:0 22px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:14px 32px;border-radius:var(--r2);font-weight:700;font-size:.95rem;cursor:pointer;text-decoration:none}
    .btn-em{background:linear-gradient(135deg,#00c896,#0ea5e9);color:#fff;border:none}
    .contact-form{background:var(--card);border:1.5px solid rgba(0,200,150,.15);border-radius:var(--r4);padding:36px 30px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:.8rem;font-weight:700;color:var(--text2);margin-bottom:7px}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 15px;background:var(--bg3);border:1.5px solid rgba(0,200,150,.12);border-radius:var(--r2);color:var(--text);font-size:.92rem}
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--em)}
    .form-group textarea{resize:vertical;min-height:120px}
  </style>
</head>
<body>

  <!-- Your existing navbar and hero can stay the same -->

  <section class="contact-sec">
    <div class="wrap">
      <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:52px">

        <!-- Contact Info -->
        <div>
          <h2>Let's Talk AI</h2>
          <p>Whether you want to list your AI tool, explore affiliate opportunities, or ask a question — we'd love to hear from you.</p>
        </div>

        <!-- Form -->
        <div class="contact-form">
          <h3>Send a Message</h3>
          
          <form action="https://formspree.io/f/mqewprnw" method="POST" id="contactForm" novalidate>
            
            <div class="form-row">
              <div class="form-group">
                <label>Your Name *</label>
                <input type="text" name="name" required>
              </div>
              <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" required>
              </div>
            </div>

            <div class="form-group">
              <label>Phone / WhatsApp</label>
              <input type="tel" name="phone">
            </div>

            <div class="form-group">
              <label>Topic *</label>
              <select name="topic" required>
                <option value="">Choose a topic…</option>
                <option value="List My AI Tool">List My AI Tool</option>
                <option value="Affiliate Program">Affiliate Program</option>
                <option value="Partnership">Partnership</option>
                <option value="Press">Press / Media</option>
                <option value="General">General Question</option>
                <option value="Bug">Bug Report</option>
              </select>
            </div>

            <div class="form-group">
              <label>Your Message *</label>
              <textarea name="message" required></textarea>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-em" style="width:100%">
              Send Message →
            </button>
          </form>

          <!-- Success Message -->
          <div id="successMessage" style="display:none; margin-top:25px; padding:20px; background:rgba(16,185,129,0.15); border:1px solid #10b981; border-radius:12px; color:#10b981; text-align:center; font-weight:600;">
            ✅ Thank you! Your message has been received.<br>We will reply within 24 hours.
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Footer (Your existing footer) -->
  <footer>
    <div class="wrap">
      © 2026 Aivora AI · Director: Varun Lalwani · India 🇮🇳
    </div>
  </footer>

  <!-- ==================== IMPORTANT SCRIPT ==================== -->
  <script>
    // Formspree Success Handler - FIXED
    document.getElementById("contactForm").addEventListener("submit", function() {
      const btn = document.getElementById("submitBtn");
      btn.innerHTML = "Sending...";
      btn.disabled = true;

      setTimeout(() => {
        document.getElementById("successMessage").style.display = "block";
        document.getElementById("contactForm").reset();
        btn.innerHTML = "Send Message →";
        btn.disabled = false;
      }, 1800);
    });
  </script>

</body>
</html>
